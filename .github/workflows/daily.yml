name: 每日腳本建議

on:
  schedule:
    - cron: '0 0 * * *'   # 台灣時間 08:00 每天
  workflow_dispatch:
    inputs:
      force:
        description: '強制重新生成（忽略今日已有建議）'
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成今日腳本建議
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_REGEN: ${{ github.event.inputs.force }}
        run: python generate_scripts.py

      - name: 更新已發布腳本的成效資料
        run: python sync_performance.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scripts.json
          git diff --cached --quiet || git commit -m "scripts $(date +'%Y-%m-%d')"
          git push
